<!-- MOBILE TOPBAR -->
<div class="mobile-topbar">
    <button class="hamburger" (click)="toggleSidebar()">
        <i [ngClass]="sidebarOpen ? 'pi pi-times' : 'pi pi-bars'"></i>
    </button>
    <div class="brand-name">Pharmacy</div>
</div>

<!-- SIDEBAR OVERLAY -->
<div class="sidebar-overlay" *ngIf="sidebarOpen" (click)="toggleSidebar()"></div>

<!-- SIDEBAR -->
<aside class="sidebar" [class.open]="sidebarOpen">
    <div class="sidebar-header">
        <i class="pi pi-shopping-cart"></i>
        <span>Pharmacy</span>
    </div>

    <nav class="sidebar-menu">
        <a [routerLink]="dashboardPath" routerLinkActive="active" class="menu-item"
            [routerLinkActiveOptions]="{ exact: false }" (click)="sidebarOpen = false">
            <i class="pi pi-th-large"></i>
            <span>Dashboard</span>
        </a>
        <a [routerLink]="inventoryPath" routerLinkActive="active" class="menu-item"
            [routerLinkActiveOptions]="{ exact: false }" (click)="sidebarOpen = false">
            <i class="pi pi-box"></i>
            <span>Inventory</span>
        </a>
        <a [routerLink]="salesPath" routerLinkActive="active" class="menu-item"
            [routerLinkActiveOptions]="{ exact: false }" (click)="sidebarOpen = false">
            <i class="pi pi-chart-line"></i>
            <span>Sales & Revenue</span>
        </a>
        <a [routerLink]="invoicesPath" routerLinkActive="active" class="menu-item"
            [routerLinkActiveOptions]="{ exact: false }" (click)="sidebarOpen = false">
            <i class="pi pi-file-pdf"></i>
            <span>Invoices</span>
        </a>
        <a [routerLink]="expensesPath" routerLinkActive="active" class="menu-item"
            [routerLinkActiveOptions]="{ exact: false }" (click)="sidebarOpen = false">
            <i class="pi pi-wallet"></i>
            <span>Expense</span>
        </a>
        <a [routerLink]="creditsPath" routerLinkActive="active" class="menu-item"
            [routerLinkActiveOptions]="{ exact: false }" (click)="sidebarOpen = false">
            <i class="pi pi-credit-card"></i>
            <span>Credit</span>
        </a>
        <a [routerLink]="distributorsPath" routerLinkActive="active" class="menu-item"
            [routerLinkActiveOptions]="{ exact: false }" (click)="sidebarOpen = false">
            <i class="pi pi-truck"></i>
            <span>Distributors</span>
        </a>
        <a [routerLink]="prescriptionsPath" routerLinkActive="active" class="menu-item"
            [routerLinkActiveOptions]="{ exact: false }" (click)="sidebarOpen = false">
            <i class="pi pi-list-check"></i>
            <span>Prescriptions</span>
        </a>
        <a [routerLink]="addPath" routerLinkActive="active" class="menu-item"
            [routerLinkActiveOptions]="{ exact: false }" (click)="sidebarOpen = false">
            <i class="pi pi-plus-circle"></i>
            <span>Add Medicine</span>
        </a>
        <a [routerLink]="trashPath" routerLinkActive="active" class="menu-item"
            [routerLinkActiveOptions]="{ exact: false }" (click)="sidebarOpen = false">
            <i class="pi pi-trash"></i>
            <span>Trash</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <button class="signout-btn" (click)="signOut()">
            <i class="pi pi-sign-out"></i>
            <span>Sign Out</span>
        </button>
    </div>
</aside>
